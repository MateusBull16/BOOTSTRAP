<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de pizzas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html"><i class="bi bi-house-fill"></i></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" aria-current="page" href="sobre.html">Sobre</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" aria-current="page" href="contato.html">Contato</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-3">
      <h3>De sugestões de novos sabores de pizzas!</h3>
      <form class="row g-3">

        <!--Nome da pizza-->
        <div class="col-md-7 col-sm-12">
          <div class="form-floating">
            <input
              type="text"
              name="nome"
              id="nome"
              class="form-control"
              placeholder="Nome da Pizza"
              required
            />
            <label for="nome">Nome da Pizza</label>
          </div>
        </div>

        <!--Valor da Pizza-->
        <div class="col-md-5 col-sm-12">
          <div class="form-floating">
            <input
              type="number" step="0.5"
              name="valor"
              id="valor"
              class="form-control"
              placeholder="Valor da Pizza"
              required
            />
            <label for="valor">Valor da Pizza</label>
          </div>
        </div>

         <!--Quantidade-->
        <div class="col-md-6 col-sm-12">
          <div class="form-floating">
            <input
              type="number"
              name="numero"
              id="numero"
              class="form-control"
              placeholder="Quantidade"
              required
            />
            <label for="numero">Quantidade</label>
          </div>
        </div>

        <!--Categoria-->
         <div class="col-md-6 col-sm-12">
          <div class="form-floating">
            <select name="categoria" id="categoria" class="form-select" required>
              <option value="" selected disabled>Selecione</option>
              <option value="frontend">Salgada</option>
              <option value="backend">Doce</option>
            </select>
            <label for="categoria">Categoria</label>
          </div>
        </div>

        <!--Feito por-->
         <div class="col-md-6 col-sm-12"> 
          <label class="form-label d-block">Feito em</label>
          <div class="form-check form-check-inline">
            <input type="radio" name="tipo" id="forno_lenha" class="form-check-input">
            <label for="aluno" class="form-check-label">Forno a lenha</label>
          </div>
          <div class="form-check form-check-inline">
            <input type="radio" name="tipo" id="forno_gas" class="form-check-input">
            <label for="professor" class="form-check-label">Forno a gás</label>
          </div>
          <div class="form-check form-check-inline">
            <input type="radio" name="tipo" id="forno_eletrico" class="form-check-input">
            <label for="professor" class="form-check-label">Forno elétrico</label>
          </div>
        </div>
      </form>
    </div>



    
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
